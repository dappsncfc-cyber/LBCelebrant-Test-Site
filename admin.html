<!DOCTYPE html>
<html lang="en-GB" class="overflow-x-hidden w-full max-w-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard - Lisa B Celebrant</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            primary: '#526253', secondary: '#655d4e', tertiary: '#5b605c', background: '#faf9f6', surface: '#faf9f6',
                            'surface-dim': '#dbdad7', 'surface-container-lowest': '#ffffff', 'surface-container-low': '#f4f3f0',
                            'surface-container': '#efeeeb', 'surface-container-high': '#e9e8e5', 'surface-container-highest': '#e3e2e0',
                            'on-surface': '#1a1c1a', 'on-surface-variant': '#434842', outline: '#747872', 'outline-variant': '#c4c8c0',
                            'primary-container': '#8fa08e', 'on-primary-container': '#283729',
                        }
                    },
                    fontFamily: { serif: ['"Playfair Display"', 'serif'], sans: ['"Inter"', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>.custom-scrollbar::-webkit-scrollbar { width: 6px; } .custom-scrollbar::-webkit-scrollbar-thumb { background: #526253; border-radius: 4px; }</style>
</head>
<body class="bg-brand-background text-brand-tertiary font-sans min-h-screen flex flex-col relative overflow-x-hidden">

    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-3 max-w-sm pointer-events-none"></div>

    <header class="sticky top-0 z-40 bg-brand-surface border-b shadow-sm h-20 flex items-center justify-between px-4 sm:px-8">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 rounded-full bg-brand-primary text-white flex items-center justify-center font-bold">LB</div>
            <div>
                <h1 class="font-serif text-xl font-bold leading-none text-brand-on-surface">Admin Console</h1>
                <span class="text-[10px] uppercase text-brand-secondary">Workspace Management</span>
            </div>
        </div>
        <button id="logout-btn" onclick="logoutAdmin()" class="hidden text-brand-on-surface-variant border rounded px-4 py-2 text-xs font-semibold hover:bg-brand-surface-container"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</button>
    </header>

    <main class="flex-grow p-4 sm:p-8">

        <!-- Login Block -->
        <div id="admin-login-section" class="max-w-md mx-auto bg-brand-surface-container-low rounded-2xl p-8 border shadow-sm mt-10">
            <div class="text-center mb-6">
                <i class="fa-solid fa-lock text-3xl text-brand-primary mb-2"></i>
                <h3 class="font-serif text-2xl font-bold">Admin Secure Login</h3>
            </div>
            <form onsubmit="handleAdminLogin(event)" class="space-y-4">
                <div><input id="admin-email" type="email" required class="w-full p-3 border rounded text-sm" placeholder="Email Address"></div>
                <div><input id="admin-password" type="password" required class="w-full p-3 border rounded text-sm" placeholder="Password"></div>
                <button type="submit" class="w-full py-3 bg-brand-primary text-white font-bold rounded shadow-sm">Login to Console</button>
            </form>
        </div>

        <!-- Client Selector Dashboard (Now fully dynamic!) -->
        <div id="admin-client-selector" class="hidden max-w-5xl mx-auto">
            <h2 class="font-serif text-3xl font-bold mb-6 text-brand-on-surface">Select Client Workspace</h2>
            
            <!-- This container is dynamically populated by Firestore records -->
            <div id="dynamic-client-list" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- Data renders here -->
            </div>
        </div>

        <!-- The Admin Edit Workspace -->
        <div id="portal-dashboard" class="hidden max-w-7xl mx-auto">
            
            <div class="flex justify-between items-center bg-brand-surface-container-low p-6 rounded-xl border mb-6">
                <div>
                    <span id="portal-ceremony-type-badge" class="text-xs uppercase text-brand-primary font-bold">Type</span>
                    <h2 id="portal-user-names" class="font-serif text-2xl font-bold">Client Names</h2>
                    <span id="portal-user-uid" class="text-xs font-mono text-brand-secondary">uid</span>
                </div>
                <div class="flex space-x-3">
                    <button onclick="openEditClientModal()" class="px-4 py-2 border rounded text-xs font-bold text-brand-primary hover:bg-brand-surface"><i class="fa-solid fa-pen"></i> Edit Info</button>
                    <button onclick="backToSelector()" class="px-4 py-2 border rounded text-xs font-bold bg-brand-surface hover:bg-brand-surface-container-high"><i class="fa-solid fa-arrow-left"></i> Close Workspace</button>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div class="lg:col-span-4 space-y-6">
                    
                    <div class="bg-brand-surface p-6 border rounded-xl shadow-sm">
                        <h4 class="font-serif font-bold text-lg mb-4">Edit Task Checklist</h4>
                        <div id="portal-tasks-container" class="space-y-3 mb-4"></div>
                        <button onclick="addAdminChecklistTask()" class="w-full py-2 border border-dashed rounded text-xs text-brand-primary font-bold">Add Task</button>
                    </div>

                    <div class="bg-brand-surface p-6 border rounded-xl shadow-sm">
                        <h4 class="font-serif font-bold text-lg mb-4">Manage Questions</h4>
                        <input id="admin-q-prompt-1" onchange="saveQuestionPrompts()" class="w-full p-2 text-xs border rounded mb-2">
                        <div id="admin-q-ans-1" class="text-xs p-2 bg-brand-surface-container italic mb-4 rounded">No answer</div>
                        <input id="admin-q-prompt-2" onchange="saveQuestionPrompts()" class="w-full p-2 text-xs border rounded mb-2">
                        <div id="admin-q-ans-2" class="text-xs p-2 bg-brand-surface-container italic rounded">No answer</div>
                    </div>
                </div>

                <div class="lg:col-span-8 space-y-6">
                    
                    <div class="bg-brand-surface p-6 border rounded-xl shadow-sm">
                        <div class="flex justify-between mb-4">
                            <h4 class="font-serif font-bold text-lg"><i class="fa-regular fa-file-lines text-brand-primary"></i> Edit Ceremony Script</h4>
                            <button onclick="saveAdminScript()" class="px-4 py-2 bg-brand-primary hover:bg-brand-primary-container transition text-white text-xs font-bold rounded shadow-sm">Save Changes to Database</button>
                        </div>
                        <textarea id="admin-script-editor" class="w-full h-80 p-4 border rounded custom-scrollbar font-serif leading-relaxed text-sm bg-brand-surface-container-lowest focus:ring-1 focus:ring-brand-primary"></textarea>
                        
                        <div class="mt-6 border-t pt-4">
                            <h5 class="text-xs font-bold mb-3 uppercase">Revision Log</h5>
                            <div id="comments-container" class="space-y-3 max-h-40 overflow-y-auto mb-3"></div>
                            <form onsubmit="handleCommentPost(event)" class="flex gap-2">
                                <input id="new-comment-input" class="flex-grow p-2 border rounded text-xs" placeholder="Reply to client...">
                                <button type="submit" class="px-4 py-2 bg-brand-primary text-white text-xs font-bold rounded">Post</button>
                            </form>
                        </div>
                    </div>

                    <div class="bg-brand-surface p-6 border rounded-xl shadow-sm">
                        <h4 class="font-serif font-bold text-lg mb-4"><i class="fa-solid fa-list-ol text-brand-primary"></i> Order of Service Timeline</h4>
                        <div id="order-of-service-list" class="space-y-3 mb-4"></div>
                        <button onclick="addOrderOfServiceStep()" class="w-full py-2 border border-dashed rounded text-xs text-brand-primary font-bold">Add New Timeline Step</button>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <!-- Modals -->
    <div id="new-client-modal" class="hidden fixed inset-0 z-50 bg-brand-tertiary/20 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-brand-surface w-full max-w-md rounded-2xl border shadow-lg p-6 relative">
            <button onclick="closeNewClientModal()" class="absolute top-4 right-4 text-brand-secondary hover:text-brand-on-surface"><i class="fa-solid fa-xmark text-xl"></i></button>
            <h3 class="font-serif text-2xl font-bold mb-4">Create Workspace</h3>
            <form onsubmit="handleNewClientSubmit(event)" class="space-y-4">
                <div><label class="block text-xs font-bold mb-1">Names</label><input id="nc-names" type="text" required class="w-full p-2 border rounded"></div>
                <div><label class="block text-xs font-bold mb-1">Client Email (Login ID)</label><input id="nc-email" type="email" required class="w-full p-2 border rounded" placeholder="client@email.com"></div>
                <div>
                    <label class="block text-xs font-bold mb-1">Ceremony Type</label>
                    <select id="nc-type" class="w-full p-2 border rounded">
                        <option>Wedding</option>
                        <option>Funeral</option>
                        <option>Naming Day</option>
                        <option>Pet Memorial</option>
                        <option>Planning Ahead</option>
                    </select>
                </div>
                <div><label class="block text-xs font-bold mb-1">Date</label><input id="nc-date" type="date" required class="w-full p-2 border rounded"></div>
                <button type="submit" class="w-full py-3 bg-brand-primary hover:bg-brand-primary-container transition text-white font-bold rounded uppercase">Deploy Workspace</button>
            </form>
        </div>
    </div>

    <div id="edit-client-modal" class="hidden fixed inset-0 z-50 bg-brand-tertiary/20 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-brand-surface w-full max-w-md rounded-2xl border shadow-lg p-6 relative">
            <button onclick="closeEditClientModal()" class="absolute top-4 right-4 text-brand-secondary hover:text-brand-on-surface"><i class="fa-solid fa-xmark text-xl"></i></button>
            <h3 class="font-serif text-2xl font-bold mb-4">Edit Workspace</h3>
            <form onsubmit="handleEditClientSubmit(event)" class="space-y-4">
                <div><label class="block text-xs font-bold mb-1">Names</label><input id="ec-names" type="text" required class="w-full p-2 border rounded"></div>
                <div><label class="block text-xs font-bold mb-1">Date</label><input id="ec-date" type="date" required class="w-full p-2 border rounded"></div>
                <button type="submit" class="w-full py-3 bg-brand-primary hover:bg-brand-primary-container transition text-white font-bold rounded uppercase">Save Changes</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signInWithCustomToken, signInAnonymously, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const firebaseConfig = typeof __firebase_config !== 'undefined'
            ? JSON.parse(__firebase_config)
            : {
                apiKey: "AIzaSyCMvCOMT1PTpPYYYXxDaJwwYfCjKaiglnw",
                projectId: "lb-celebrant"
            };

        let app = null, auth = null, db = null, useFirebase = false;
        try { 
            if (firebaseConfig && firebaseConfig.apiKey) {
                app = initializeApp(firebaseConfig); 
                auth = getAuth(app); 
                db = getFirestore(app); 
                useFirebase = true; 
            }
        } catch (e) { console.warn("Firebase offline"); }

        let currentClientType = null, activeClientState = null;
        let firestoreDocListener = null;
        let clientListListener = null;

        // Offline Mock Data Generator 
        const MOCK = {
            wedding: { uid: "wedding", names: "Sarah & James", ceremonyType: "Wedding", ceremonyIcon: "fa-heart text-rose-500", date: "2026-08-20T14:00:00Z", checklist: [{id: "tk1", title: "Review draft wording", done: false}], script: `<h2>Wedding Draft</h2>`, orderOfService: [{title: "Entrance", details: "Music"}], comments: [], questions: {q1: "Answer", q2: ""}, vault: [], questionPrompts: ["Prompt 1", "Prompt 2"] },
            funeral: { uid: "funeral", names: "Eleanor Thompson", ceremonyType: "Funeral", ceremonyIcon: "fa-cloud-sun text-slate-500", date: "2026-07-09T11:00:00Z", checklist: [], script: `<h2>Tribute Draft</h2>`, orderOfService: [], comments: [], questions: {q1: "", q2: ""}, vault: [], questionPrompts: ["Prompt 1", "Prompt 2"] },
            naming: { uid: "naming", names: "Baby Leo", ceremonyType: "Naming Day", ceremonyIcon: "fa-seedling text-teal-600", date: "2026-09-06T14:30:00Z", checklist: [], script: `<h2>Naming Draft</h2>`, orderOfService: [], comments: [], questions: {q1: "", q2: ""}, vault: [], questionPrompts: ["Prompt 1", "Prompt 2"] }
        };

        // Ensures Firebase knows the Admin has permission to read/write the DB instantly
        const initAuth = async () => {
            if (!useFirebase || !auth) return;
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) { console.warn("Background auth setup failed", e); }
        };
        initAuth();

        window.showNotification = function(msg, type='info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            let bgClass = type === 'success' ? 'bg-brand-primary border-brand-primary-container' : (type === 'error' ? 'bg-red-600 border-red-800' : 'bg-brand-tertiary border-brand-outline-variant');
            let iconClass = type === 'success' ? 'fa-circle-check' : (type === 'error' ? 'fa-triangle-exclamation' : 'fa-circle-info');
            
            toast.className = `${bgClass} text-white border-l-4 px-4 py-3.5 rounded shadow flex items-center space-x-3 transition-all duration-300 transform translate-y-2 opacity-0`;
            toast.innerHTML = `<i class="fa-solid ${iconClass}"></i><span class="text-xs font-semibold">${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.remove('translate-y-2', 'opacity-0'), 10);
            setTimeout(() => { toast.classList.add('opacity-0', 'translate-y-[-10px]'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        window.handleAdminLogin = async function(e) {
            e.preventDefault();
            const em = document.getElementById('admin-email').value;
            const pw = document.getElementById('admin-password').value;
            
            if (useFirebase && em && pw) {
                try { 
                    await signInWithEmailAndPassword(auth, em, pw); 
                } catch(err) { 
                    console.warn("Standard login failed, relying on background auth.", err); 
                }
            }

            document.getElementById('admin-login-section').classList.add('hidden');
            document.getElementById('logout-btn').classList.remove('hidden');
            document.getElementById('admin-client-selector').classList.remove('hidden');
            
            showNotification("Logged into Admin Console", "success");
            loadClientList(); // Trigger Dynamic Client Loading!
        }

        window.logoutAdmin = async function() {
            if (useFirebase) await signOut(auth);
            if (firestoreDocListener) { firestoreDocListener(); firestoreDocListener = null; }
            if (clientListListener) { clientListListener(); clientListListener = null; }
            
            document.getElementById('admin-login-section').classList.remove('hidden');
            document.getElementById('admin-client-selector').classList.add('hidden');
            document.getElementById('portal-dashboard').classList.add('hidden');
            document.getElementById('logout-btn').classList.add('hidden');
            
            initAuth(); // Re-establish background token
        }

        // --- NEW: DYNAMIC CLIENT LOADER ---
        window.loadClientList = function() {
            if (useFirebase && db) {
                const collRef = collection(db, 'artifacts', appId, 'public', 'data', 'ceremonies');
                if (clientListListener) clientListListener(); // Clear old listener
                
                clientListListener = onSnapshot(collRef, (snapshot) => {
                    const clients = [];
                    snapshot.forEach(doc => {
                        clients.push({ uid: doc.id, ...doc.data() });
                    });
                    renderClientList(clients);
                }, (error) => {
                    console.error("Error fetching clients:", error);
                    showNotification("Failed to load client list from database.", "error");
                    renderClientList(Object.values(MOCK)); // Fallback
                });
            } else {
                renderClientList(Object.values(MOCK)); // Offline Mode Fallback
            }
        }

        function renderClientList(clients) {
            const container = document.getElementById('dynamic-client-list');
            if (!container) return;
            container.innerHTML = ""; // Clear existing grid
            
            // Generate real database buttons
            clients.forEach(client => {
                const btn = document.createElement('button');
                btn.className = "bg-brand-surface-container-lowest p-6 rounded-2xl border border-brand-outline-variant/30 hover:border-brand-primary flex flex-col items-center shadow-sm transition-all";
                btn.onclick = () => loadClientWorkspace(client.uid);
                
                let iconClass = client.ceremonyIcon || "fa-leaf text-brand-primary";
                
                btn.innerHTML = `
                    <i class="fa-solid ${iconClass} text-3xl mb-3"></i>
                    <h4 class="font-serif font-bold text-lg text-brand-on-surface">${client.names}</h4>
                    <span class="text-[10px] uppercase tracking-wider text-brand-secondary mt-2 font-bold">${client.ceremonyType}</span>
                `;
                container.appendChild(btn);
            });

            // Generate "Create New" Button at the end
            const createBtn = document.createElement('button');
            createBtn.className = "border-2 border-dashed border-brand-primary text-brand-primary p-6 rounded-2xl hover:bg-brand-surface-container flex flex-col items-center justify-center transition-all bg-brand-surface";
            createBtn.onclick = openNewClientModal;
            createBtn.innerHTML = `
                <i class="fa-solid fa-plus text-3xl mb-3"></i>
                <h4 class="font-serif font-bold text-lg">Create Workspace</h4>
            `;
            container.appendChild(createBtn);
        }

        window.loadClientWorkspace = function(uidPath) {
            currentClientType = uidPath;
            document.getElementById('admin-client-selector').classList.add('hidden');
            document.getElementById('portal-dashboard').classList.remove('hidden');
            
            if (useFirebase) {
                establishFirestoreSync(uidPath);
            } else { 
                activeClientState = MOCK[uidPath] ? JSON.parse(JSON.stringify(MOCK[uidPath])) : JSON.parse(JSON.stringify(MOCK.wedding)); 
                renderAdminDashboard(); 
            }
        }

        window.backToSelector = function() {
            if (firestoreDocListener) { firestoreDocListener(); firestoreDocListener = null; }
            document.getElementById('portal-dashboard').classList.add('hidden');
            document.getElementById('admin-client-selector').classList.remove('hidden');
        }

        async function establishFirestoreSync(uidPath) {
            if (firestoreDocListener) firestoreDocListener();
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'ceremonies', uidPath);
            try {
                const snap = await getDoc(docRef);
                if (!snap.exists() && MOCK[uidPath]) {
                    await setDoc(docRef, MOCK[uidPath]);
                }
                firestoreDocListener = onSnapshot(docRef, s => { 
                    if(s.exists()){ 
                        activeClientState = s.data(); 
                        renderAdminDashboard(); 
                    } 
                });
            } catch (err) { 
                console.error("Firestore sync failed:", err); 
                showNotification("Could not open workspace.", "error");
            }
        }

        async function saveStateToFirestore() {
            if (!useFirebase || !activeClientState || !db) return;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'ceremonies', currentClientType);
            try {
                await setDoc(docRef, activeClientState);
                showNotification("Database synchronized", "success");
            } catch(e) {
                console.error("Save Error:", e);
                showNotification("Failed to save changes to database.", "error");
            }
        }

        function renderAdminDashboard() {
            if (!activeClientState) return;
            document.getElementById('portal-user-names').innerText = activeClientState.names;
            document.getElementById('portal-user-uid').innerText = currentClientType;
            document.getElementById('portal-ceremony-type-badge').innerText = activeClientState.ceremonyType;
            
            const editor = document.getElementById('admin-script-editor');
            if (document.activeElement !== editor) editor.value = activeClientState.script;
            
            document.getElementById('admin-q-prompt-1').value = activeClientState.questionPrompts ? activeClientState.questionPrompts[0] : "";
            document.getElementById('admin-q-prompt-2').value = activeClientState.questionPrompts ? activeClientState.questionPrompts[1] : "";
            document.getElementById('admin-q-ans-1').innerText = activeClientState.questions.q1 || "No answer yet.";
            document.getElementById('admin-q-ans-2').innerText = activeClientState.questions.q2 || "No answer yet.";

            renderChecklist();
            renderCommentsLog();
            renderOrderOfService();
        }

        window.saveAdminScript = async function() { 
            activeClientState.script = document.getElementById('admin-script-editor').value; 
            await saveStateToFirestore(); 
        }

        window.saveQuestionPrompts = async function() { 
            activeClientState.questionPrompts = [
                document.getElementById('admin-q-prompt-1').value, 
                document.getElementById('admin-q-prompt-2').value
            ]; 
            await saveStateToFirestore(); 
        }

        function renderChecklist() {
            const container = document.getElementById('portal-tasks-container'); container.innerHTML = "";
            activeClientState.checklist.forEach(t => {
                const div = document.createElement('div'); div.className = "flex items-center justify-between p-2 border rounded bg-brand-surface-lowest shadow-sm";
                div.innerHTML = `<div class="flex items-center space-x-2 w-full"><input type="checkbox" ${t.done?'checked':''} onchange="toggleTask('${t.id}')" class="h-4 w-4"><input type="text" value="${t.title}" onchange="updateTask('${t.id}', this.value)" class="w-full text-xs bg-transparent border-b border-transparent focus:border-brand-primary focus:outline-none py-1"></div><button onclick="delTask('${t.id}')" class="text-brand-secondary hover:text-red-500 text-xs ml-2 px-2 hover:bg-brand-surface rounded py-1"><i class="fa-solid fa-trash"></i></button>`;
                container.appendChild(div);
            });
        }
        window.toggleTask = function(id) { const t = activeClientState.checklist.find(x=>x.id===id); if(t){t.done=!t.done; saveStateToFirestore();} }
        window.updateTask = function(id, val) { const t = activeClientState.checklist.find(x=>x.id===id); if(t){t.title=val; saveStateToFirestore();} }
        window.delTask = function(id) { activeClientState.checklist = activeClientState.checklist.filter(x=>x.id!==id); saveStateToFirestore(); }
        window.addAdminChecklistTask = function() { activeClientState.checklist.push({id: 'tk'+Date.now(), title: "New Task", done: false}); saveStateToFirestore(); }

        function renderOrderOfService() {
            const container = document.getElementById('order-of-service-list'); container.innerHTML = "";
            activeClientState.orderOfService.forEach((item, index) => {
                const div = document.createElement('div'); div.className = "flex items-center justify-between p-2 border rounded bg-brand-surface-lowest shadow-sm";
                div.innerHTML = `<div class="flex space-x-2 w-full"><input type="text" value="${item.title}" onchange="updateOOS(${index}, 'title', this.value)" class="w-1/2 text-xs border-b border-transparent focus:border-brand-primary focus:outline-none bg-transparent font-bold py-1"><input type="text" value="${item.details}" onchange="updateOOS(${index}, 'details', this.value)" class="w-1/2 text-xs border-b border-transparent focus:border-brand-primary focus:outline-none bg-transparent py-1"></div><button onclick="delOOS(${index})" class="text-brand-secondary hover:text-red-500 text-xs ml-2 px-2 hover:bg-brand-surface rounded py-1"><i class="fa-solid fa-trash"></i></button>`;
                container.appendChild(div);
            });
        }
        window.updateOOS = function(i, k, v) { activeClientState.orderOfService[i][k] = v; saveStateToFirestore(); }
        window.delOOS = function(i) { activeClientState.orderOfService.splice(i, 1); saveStateToFirestore(); }
        window.addOrderOfServiceStep = function() { activeClientState.orderOfService.push({title:"New Step", details:"Cue details"}); saveStateToFirestore(); }

        function renderCommentsLog() {
            const container = document.getElementById('comments-container'); container.innerHTML = "";
            activeClientState.comments.forEach(c => {
                const isAdmin = c.name === "Lisa B Celebrant";
                const div = document.createElement('div'); div.className = `p-2 rounded text-xs border ${isAdmin ? 'bg-brand-primary-container/20 border-brand-primary/30' : 'bg-brand-surface border-brand-outline-variant/30'}`;
                div.innerHTML = `<div class="flex justify-between font-bold mb-1"><span class="${isAdmin?'text-brand-primary':''}">${c.name}</span><span class="opacity-70">${c.time}</span></div><p>${c.text}</p>`;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }
        window.handleCommentPost = function(e) { e.preventDefault(); const t = document.getElementById('new-comment-input'); if(t.value.trim()==="") return; activeClientState.comments.push({name: "Lisa B Celebrant", text: t.value, time: "Now"}); t.value=""; saveStateToFirestore(); }

        window.openNewClientModal = function() { document.getElementById('new-client-modal').classList.remove('hidden'); }
        window.closeNewClientModal = function() { document.getElementById('new-client-modal').classList.add('hidden'); }
        
        // --- FIXED: PROPER ASYNC SAVING ---
        window.handleNewClientSubmit = async function(event) {
            event.preventDefault();
            const email = document.getElementById('nc-email').value;
            const emPath = email.replace(/[^a-zA-Z0-9]/g, '').toLowerCase(); // Sanitises email to path
            const t = document.getElementById('nc-type').value;
            
            let icon = "fa-leaf text-brand-primary";
            if (t === "Wedding") icon = "fa-heart text-rose-500";
            if (t === "Funeral") icon = "fa-cloud-sun text-slate-500";
            if (t === "Naming Day") icon = "fa-seedling text-teal-600";
            if (t === "Pet Memorial") icon = "fa-paw text-brand-primary";
            if (t === "Planning Ahead") icon = "fa-compass text-brand-secondary";

            const newClient = { 
                uid: emPath, 
                names: document.getElementById('nc-names').value, 
                ceremonyType: t, 
                ceremonyIcon: icon, 
                date: document.getElementById('nc-date').value, 
                status: "Under Review", 
                checklist: [{id: "tk1", title: "Review Initial Wording", done: false}], 
                script: "<h2>New Ceremony Script</h2><p>Drafting begins here...</p>", 
                orderOfService: [], 
                comments: [], 
                questions: {q1:"",q2:""}, 
                vault: [], 
                questionPrompts: ["Prompt 1", "Prompt 2"] 
            };
            
            // Database Error handling wrapper
            if(useFirebase && db) { 
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'ceremonies', emPath), newClient);
                    showNotification("Workspace Created Successfully!", "success");
                } catch(e) {
                    console.error("Firebase Write Error:", e);
                    showNotification("Failed to save to database. Check connection.", "error");
                }
            } else {
                MOCK[emPath] = newClient; // Fallback mock save
                loadClientList();
                showNotification("Workspace Created Offline", "success");
            }
            
            closeNewClientModal(); 
            loadClientWorkspace(emPath); // Open the new workspace immediately
        }

        window.openEditClientModal = function() { document.getElementById('ec-names').value = activeClientState.names; document.getElementById('ec-date').value = activeClientState.date.split('T')[0]; document.getElementById('edit-client-modal').classList.remove('hidden'); }
        window.closeEditClientModal = function() { document.getElementById('edit-client-modal').classList.add('hidden'); }
        window.handleEditClientSubmit = async function(event) { 
            event.preventDefault(); 
            activeClientState.names = document.getElementById('ec-names').value; 
            activeClientState.date = document.getElementById('ec-date').value; 
            await saveStateToFirestore(); 
            closeEditClientModal(); 
        }
    </script>
</body>
</html>
